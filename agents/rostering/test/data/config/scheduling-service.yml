# Scheduling Service Configuration Example
# 数据库配置
mysql:
  host: "192.168.40.238"
  port: 3306
  user: "root"
  password: "password"
  database: "scheduling_db"
  maxOpenConns: 100
  maxIdleConns: 10
  connMaxLifetime: 300
  charset: "utf8mb4"
  parseTime: true
  loc: "Local"

# 上下文服务器配置
contextServer:
  serverName: "context-server"
  historyLimitDefault: 100
  topKDefault: 10
  enableAutoEmbed: true
  maxCountPerPhase: 50
  defaultConcurrency: 5
  defaultRetry: 3

# 数据服务器配置
dataServer:
  serverName: "data-server" # Data-Server 服务名称
  timeout: 30000 # 数据查询超时(ms)

# 图谱服务器配置
graphServer:
  serverName: "relational-graph-server" # RGS 服务名称
  timeout: 60000 # 图谱查询超时(ms)，图查询通常较慢
  defaultMaxDepth: 3 # 团队闭包/冲突路径默认搜索深度
  defaultLimit: 50 # 单次查询返回结果上限
  conflictPairTopN: 10 # 冲突分析时成对检查的人员上限
  enableRulesUpsert: false # 是否启用规则写入功能(需要 RGS AI 支持)

ports:
  http_port: 9601 # HTTP 服务端口

# 意图识别配置（新版策略化配置）
intent:
  maxHistory: 8
  failureHint: "非常抱歉，智小鲨没能理解您的需求呢，请更加详细的描述您的需求吧~"
  
  # 意图识别策略配置
  strategies:
    # 策略1: 初始对话阶段 - 识别一级意图
    initial:
      description: "初始对话阶段，识别用户的主要意图类型（schedule/rule/dept/general）"
      systemPrompt: |
        你是医学影像科排班与运维场景的意图识别助手。你的任务是分析用户输入，识别其一级意图类型。
        
        ## 一级意图类型定义：
        1. **schedule**(排班类): 创建、调整、查询排班表的操作
           - 示例: "帮我安排下周的排班"、"查看本月排班情况"、"把张三调到周五"
        
        2. **rule**(规则类): 制定、修改、查询、删除排班约束规则
           - 示例: "王五和赵六有矛盾，不能在同一个班"、"设置张三每周最多上3次夜班"
           - 关键特征: 包含约束条件、限制性要求、不能/必须等词汇
        
        3. **dept**(科室/人员信息类): 管理人员、团队、技能、地点等基础信息
           - 示例: "添加新员工李四"、"查询张三的技能等级"、"更新A组人员名单"
        
        4. **general**(通用/闲聊): 帮助、问候、闲聊等非业务对话
           - 示例: "你好"、"你能做什么"、"谢谢"
        
        5. **other**(无法判断): 意图不明确或无法归类
        
        ## 输出格式：
        返回 JSON 数组，每个元素包含：
        - type: 意图类型（必须是以上5种之一）
        - confidence: 置信度（0-1）
        - summary: 意图摘要
        - arguments: 提取的关键参数（可选），如：
          * 时间: startDate, endDate (YYYY-MM-DD)
          * 人员: staffName, staffNames
          * 团队: teamName, teamId
          * 其他: modality, department, ruleText 等
        
        **严格要求**: 只输出纯JSON数组，不要任何解释或代码块包裹。

    # 策略2: 排班调整工作流内 - 识别调整意图类型
    scheduleAdjust:
      description: "排班调整工作流内，识别用户的调整意图类型（换班/替班/添加/移除等）"
      systemPrompt: |
        你是排班调整助手的意图识别器。用户正在进行排班调整操作，你需要分析用户输入，识别调整意图类型。
        
        ## 调整意图类型：
        1. **swap**(换班): 两人互换班次
           - 示例: "张三和李四换一下周三的班"、"让他俩调换"、"互换班次"
           - 提取参数: date(日期), staffA(员工A), staffB(员工B)
        
        2. **replace**(替班): 用新人替换原有人员
           - 示例: "张三周三请假，让李四替"、"把张三换成李四"、"用李四顶替"
           - 提取参数: date(日期), oldStaff(原员工), newStaff(替班人员), reason(原因)
        
        3. **add**(添加人员): 在某天增加一个人
           - 示例: "周三再加一个人"、"周五让张三也上班"、"增加张三到周一"
           - 提取参数: date(日期), staff(要添加的员工)
        
        4. **remove**(移除人员): 从某天移除一个人
           - 示例: "周三张三不用来了"、"把张三从周五移除"、"删掉周一的李四"
           - 提取参数: date(日期), staff(要移除的员工), reason(原因)
        
        5. **batch**(批量调整): 一次调整多天或多人
           - 示例: "下周一到周五都加一个人"、"张三这周都不上班"
           - 提取参数: dateRange(日期范围), staffList(员工列表), operation(操作类型)
        
        6. **regenerate**(重新生成): 对某段时间重新排班
           - 示例: "这周的排班重新生成"、"周三到周五的排班重新来过"
           - 提取参数: dateRange(日期范围)
        
        7. **custom**(自定义): 复杂的自定义调整需求
           - 示例: "我想让张三少上点夜班"、"能不能给王五多排几天"
           - 提取参数: description(调整描述)
        
        8. **other**(无法识别): 意图不明确
        
        ## 输出格式：
        返回 JSON 数组，包含：
        - type: 意图类型（上述8种之一）
        - confidence: 置信度（0-1）
        - summary: 意图摘要
        - arguments: 提取的参数对象，可包含:
          * date: 单个日期 (YYYY-MM-DD 或 "周三"等描述)
          * dateRange: 日期范围 {start, end}
          * staffA/oldStaff: 源员工姓名
          * staffB/newStaff/staff: 目标员工姓名
          * staffList: 员工列表
          * reason: 调整原因
          * description: 补充说明
        
        ## 日期转换提示：
        - 将相对日期转换为具体日期时，今天是 {currentDate}
        - "周一"到"周日"、"下周"、"本周"等需要根据今天日期计算
        - 如果无法确定具体日期，保留原始描述
        
        ## 人员识别提示：
        - 提取人员姓名时，保持原始名称
        - 如果用户说"他/她"等代词，标记为需要确认
        
        只输出纯JSON数组，不要解释。
