# Context Server 特定配置
# 这个文件定义了 context-server 服务的特定配置
# 它会与 common.yml 中的基础配置合并
# mcp配置
discovery:
  nacos:
    groupName: "mcp-server"

# 工具配置
tools:
  enabled_tools:
    - "memory.create" # 创建记忆
    - "memory.read" # 读取记忆
    - "memory.update" # 更新记忆
    - "memory.delete" # 删除记忆
    - "memory.search" # 按标签搜索记忆
    - "memory.semantic_search" # 语义搜索记忆
    - "conversation.new" # 创建新对话
    - "conversation.append" # 向对话添加消息
    - "conversation.history" # 获取对话历史
    - "conversation.list" # 列出对话
    - "conversation.update_workflow_context" # 更新工作流上下文
    - "conversation.get_workflow_context" # 获取工作流上下文
    - "conversation.update_meta" # 更新对话元数据
  dangerous:
    enabled: false # 是否启用危险操作
    require_passcode: true # 是否需要密码
    passcode: "" # 操作密码
    allowed_actions:
      - "truncate_table" # 允许的危险操作
    allowed_tables:
      - "schedules" # 允许操作的表

# Milvus 扩展配置 - 这些配置补充了 common.yml 中的基础 Milvus 配置
milvus_extra:
  vector_dimension: 1024 # 向量维度 - 确保与嵌入模型输出维度一致
  collection_name: "gantt_context" # 集合名称 - 可以覆盖基础配置中的默认值
  index_type: "HNSW" # 索引类型 - 目前仅支持 HNSW
  metric_type: "COSINE" # 距离度量类型（COSINE, IP, L2）
  hnsw_m: 8 # HNSW 参数 M - 控制连接数，影响性能和准确性
  hnsw_ef_construction: 96 # HNSW 参数 efConstruction - 构建时的搜索深度

database:
  mysql:
    dbname: "contextdb" # 数据库名称

ports:
  http_port: 9613 # HTTP 服务端口
