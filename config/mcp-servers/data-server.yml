discovery:
  nacos:
    groupName: "mcp-server"

tools:
  enabled_tools:
    - ping_db
    
    # 排班管理工具 (Schedule Manager)
    - schedule_manager.query_schedules          # 查询排班
    - schedule_manager.upsert_schedule          # 插入/更新排班
    - schedule_manager.delete_schedule          # 删除排班
    - schedule_manager.query_bulk               # 批量查询排班
    - schedule_manager.batch_upsert_schedules   # 批量插入/更新排班
    
    # 人员管理工具 (Staff Manager)
    - staff_manager.create_staff                # 创建人员
    - staff_manager.list_staff                  # 列出人员
    - staff_manager.search_staff                # 搜索人员（按姓名、用户ID、角色）
    - staff_manager.check_staff_exists          # 检查人员是否存在
    - staff_manager.get_eligible_staff          # 获取可用人员（排除请假）
    
    # 团队和配置管理工具 (Staffing Manager)
    - staffing_manager.create_team              # 创建团队
    - staffing_manager.update_team              # 更新团队
    - staffing_manager.assign_team_members      # 分配团队成员
    - staffing_manager.list_teams               # 列出团队
    - staffing_manager.create_shift             # 创建班次
    - staffing_manager.list_shifts              # 列出班次
    - staffing_manager.create_leave             # 创建请假记录
    - staffing_manager.get_leave_records        # 获取请假记录
    - staffing_manager.list_staff_classifications  # 列出人员分类（一线/二线/三线）
    - staffing_manager.list_staff_roles         # 列出人员角色（博士后/研究生等）
    
    # 排班范围管理工具 (Shift Team - 班次与团队关联)
    - staffing_manager.create_shift_team        # 创建排班范围
    - staffing_manager.batch_create_shift_teams # 批量创建排班范围
    - staffing_manager.update_shift_team        # 更新排班范围
    - staffing_manager.delete_shift_team        # 删除排班范围
    - staffing_manager.list_shift_teams         # 列出排班范围
    - staffing_manager.get_teams_by_shift_id    # 查询班次的可用团队（支持父级fallback）
    
  dangerous:
    enabled: false
    require_passcode: true
    passcode: ""
    allowed_actions:
      - truncate_table
    allowed_tables:
      - schedules

database:
  mysql:
    dbname: "schedulingdb" # 数据库名称

ports:
  http_port: 9612 # HTTP 服务端口
