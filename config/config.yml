# AI 智能排班 SaaS 平台 — 配置文件
# 环境变量覆盖：GANTT_<SECTION>_<KEY>，例如 GANTT_SERVER_PORT=9090

server:
  port: 8080
  mode: development        # development / production
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 10s

database:
  host: rm-bp1rheo805r5j4e897o.mysql.rds.aliyuncs.com
  port: 3306
  name: gantt_dev
  user: gantt_dev
  password: Gantt@2026
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 3600  # 秒

redis:
  addr: lumenlan-dev.redis.rds.aliyuncs.com:6379
  password: soundlan@2025
  db: 11

log:
  level: debug             # debug / info / warn / error
  format: console          # json / console（开发环境用 console）
  output: stdout           # stdout / 文件路径

jwt:
  secret: "gantt-saas-secret-change-me"   # 生产环境请替换为随机强密钥
  access_token_ttl: 2h
  refresh_token_ttl: 168h                 # 7 天
  issuer: "gantt-saas"

ai:
  enabled: false           # 全局 AI 开关
  default_provider: ""     # 默认 Provider: openai / bailian / ollama（空值自动选第一个可用）

  openai:
    enabled: false
    api_key: ""            # OpenAI API Key
    base_url: ""           # 可选，自定义 Base URL（兼容第三方 OpenAI 接口）
    model: "gpt-4o-mini"
    timeout: 60

  bailian:
    enabled: false
    api_key: ""            # 阿里云百炼 DashScope API Key
    base_url: "https://dashscope.aliyuncs.com"
    model: "qwen-turbo"
    timeout: 60

  ollama:
    enabled: false
    base_url: "http://localhost:11434"
    model: "qwen2.5:7b"
    timeout: 300

  quota:
    default_monthly_tokens: 100000   # 每个组织每月默认 token 限额

# 默认平台管理员（首次启动时自动创建，幂等）
admin:
  username: "admin"
  email: "liguantao@jusha.com.cn"
  password: "Admin@123456"    # 首次登录强制要求重置密码